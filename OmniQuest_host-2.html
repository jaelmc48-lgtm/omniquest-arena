                            <select id="sel-diff-cpu" ${!state.vsCpuMode?'disabled':''}><option value="EASY" ${state.cpuDifficulty==='EASY'?'selected':''}>FГЎcil</option><option value="MEDIUM" ${state.cpuDifficulty==='MEDIUM'?'selected':''}>MГ©dio</option><option value="HARD" ${state.cpuDifficulty==='HARD'?'selected':''}>DifГӯcil</option></select>
                        </div>
                        <div style="width:100%;display:flex;align-items:center;gap:10px;padding-top:10px;border-top:1px solid var(--border)">
                            <input type="checkbox" id="chk-fields" ${state.enableFields?'checked':''}><label for="chk-fields" style="font-weight:600;cursor:pointer;font-size:0.85rem">Ativar Casas de Campo рҹҢҢ</label>
                        </div>
                    </div>
                    <div style="background:var(--surface);padding:16px;border-radius:var(--radius);border:1px solid var(--border)">
                        <h3 style="font-weight:700;font-size:0.9rem;margin-bottom:10px">Categoria de Perguntas</h3>
                        <select id="sel-cat-filter">${getCategories().map(c=>`<option value="${c}" ${state.activeGameCategory===c?'selected':''}>${c}</option>`).join('')}</select>
                    </div>
                    <div style="background:var(--surface);padding:16px;border-radius:var(--radius);border:1px solid var(--border)">
                        <h3 style="font-weight:700;font-size:0.9rem;margin-bottom:10px">Tema Visual</h3>
                        <div class="theme-grid">${Object.values(THEMES).map(t=>`<button data-id="${t.id}" class="theme-btn btn-theme ${state.currentTheme.id===t.id?'active':''}"><div class="theme-preview" style="background:${t.bgApp}"></div><span>${t.name}</span></button>`).join('')}</div>
                    </div>
                    <div style="background:var(--surface);padding:16px;border-radius:var(--radius);border:1px solid var(--border)">
                        <h3 style="font-weight:700;font-size:0.9rem;margin-bottom:10px">Layout do Tabuleiro</h3>
                        <div class="theme-grid">${Object.values(LAYOUTS).map(l=>`<button data-id="${l.id}" class="theme-btn btn-layout ${state.currentLayout.id===l.id?'active':''}"><span style="font-size:1.35rem">${l.icon}</span><span>${l.name}</span></button>`).join('')}</div>
                    </div>
                </div>
                <div style="padding:14px 16px;background:var(--surface);border-top:1px solid var(--border)">
                    <button id="btn-start" class="btn-primary w-full" style="background:linear-gradient(135deg,#06d6a0,#059669);font-size:0.95rem">рҹҡҖ INICIAR JOGO</button>
                </div>
            </div>
        </div>`;
}

function renderEditor(){
    const opts=['A)','B)','C)','D)'];
    const qs=state.questions.map(q=>`
        <div class="q-card">
            <div style="flex:1;min-width:0">
                <div style="font-size:0.73rem;color:var(--accent);font-weight:700;margin-bottom:3px">${q.category||'Geral'} В· ${q.type==='vf'?'V/F':'Obj.'}</div>
                <div style="font-size:0.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${q.question}</div>
                <div style="font-size:0.7rem;color:var(--green);margin-top:3px">вң“ ${q.type==='vf'?['Verdadeiro','Falso'][q.answer]:q.options[q.answer]}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;margin-left:10px">
                <button class="btn-editor-action btn-edit" data-id="${q.id}" style="background:rgba(108,99,255,0.5)">вңҸпёҸ</button>
                <button class="btn-editor-action btn-del" data-id="${q.id}" style="background:rgba(255,107,107,0.5)">рҹ—‘</button>
            </div>
        </div>`).join('');
    const optInputs=state.newQ.options.map((o,i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <input type="radio" name="ans" class="rad-ans" data-i="${i}" ${state.newQ.answer===i?'checked':''} ${state.newQ.type==='vf'&&i>1?'disabled':''}>
            <input type="text" class="inp-opt" data-i="${i}" value="${o}" placeholder="${opts[i]}" ${state.newQ.type==='vf'&&i>1?'disabled style="opacity:0.3"':''}>
        </div>`).join('');
    return `<div class="editor-container">
        <div class="editor-header">
            <div style="display:flex;align-items:center;gap:10px">
                <button id="btn-editor-back" class="btn-primary" style="background:#374151;padding:8px 14px;font-size:0.8rem">вҶҗ Voltar</button>
                <span style="font-family:var(--font-display);font-size:1.2rem;letter-spacing:2px">EDITOR DE PERGUNTAS</span>
                <span style="font-size:0.78rem;color:var(--text-muted)">${state.questions.length} perguntas</span>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
                <button id="btn-dl" class="btn-editor-action" style="background:rgba(6,214,160,0.5)">в¬ҮпёҸ Exportar JSON</button>
                <label class="btn-editor-action" style="background:rgba(108,99,255,0.5);cursor:pointer">рҹ“Ӯ JSON<input type="file" id="inp-json" accept=".json" class="hidden"></label>
                <label class="btn-editor-action" style="background:rgba(255,209,102,0.5);cursor:pointer;color:#1a1100">рҹ“қ TXT<input type="file" id="inp-txt" accept=".txt" class="hidden"></label>
                <button id="btn-wipe" class="btn-editor-action" style="background:rgba(255,107,107,0.5)">рҹ—‘ Limpar Tudo</button>
            </div>
        </div>
        <div class="editor-main">
            <div class="editor-form" id="editor-form-col">
                <div style="font-weight:700;font-size:0.85rem;margin-bottom:14px;color:var(--accent)">${state.editingId?'вңҸпёҸ Editar':'вһ• Nova Pergunta'}</div>
                <div style="margin-bottom:10px"><label class="form-lbl">Tipo</label>
                    <select id="inp-type"><option value="obj" ${state.newQ.type==='obj'?'selected':''}>Objetiva</option><option value="vf" ${state.newQ.type==='vf'?'selected':''}>Verdadeiro/Falso</option></select>
                </div>
                <div style="margin-bottom:10px"><label class="form-lbl">Categoria</label><input type="text" id="inp-cat" value="${state.newQ.category}" placeholder="Ex: HistГіria, CiГӘncias..."></div>
                <div style="margin-bottom:10px"><label class="form-lbl">Pergunta</label><textarea id="inp-q" rows="3" style="resize:vertical" placeholder="Digite a pergunta...">${state.newQ.question}</textarea></div>
                <div style="margin-bottom:10px"><label class="form-lbl">Alternativas (marque a correta)</label>${optInputs}</div>
                <div style="display:flex;gap:8px">
                    <button id="btn-save-q" class="btn-primary" style="flex:1;background:var(--green);padding:10px">${state.editingId?'Salvar EdiГ§ГЈo':'Adicionar'}</button>
                    ${state.editingId?`<button id="btn-cancel" class="btn-primary" style="background:#374151;padding:10px">Cancelar</button>`:''}
                </div>
            </div>
            <div class="editor-list">${qs||`<div style="text-align:center;padding:40px;color:var(--text-muted)">Nenhuma pergunta ainda. Adicione a primeira!</div>`}</div>
        </div>
    </div>`;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   UPDATE UI вҖ” DESPACHA PARA A TELA CORRETA
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function updateUI(){
    const app = document.getElementById('app');
    const modalsEl = document.getElementById('modals-container');
    document.body.style.backgroundColor = state.currentTheme.bgApp;
    document.body.classList.toggle('light-mode', state.lightMode);

    if(state.screen === 'connecting'){
        app.innerHTML = `<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)">
            <div style="font-size:3.5rem;animation:spin-3d 1s linear infinite">рҹҺІ</div>
            <div style="font-family:var(--font-display);font-size:1.8rem;letter-spacing:3px;color:var(--accent)">CONECTANDOвҖҰ</div>
            <div style="font-size:0.8rem;color:var(--text-muted)">Estabelecendo conexГЈo com Firebase</div>
        </div>`;
        modalsEl.innerHTML = '';
        return;
    }
    if(state.screen === 'error_firebase'){
        app.innerHTML = `<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);padding:24px;text-align:center">
            <div style="font-size:3rem">вқҢ</div>
            <div style="font-family:var(--font-display);font-size:1.6rem;color:var(--red);letter-spacing:2px">ERRO FIREBASE</div>
            <div style="font-size:0.82rem;color:var(--text-muted);max-width:360px;line-height:1.6">NГЈo foi possГӯvel inicializar o Firebase. Verifique as credenciais no cГіdigo-fonte ou a conexГЈo com a internet.</div>
            <button onclick="location.reload()" style="margin-top:8px;padding:12px 28px;border-radius:12px;background:var(--accent);color:white;font-weight:700;font-size:0.88rem">рҹ”„ Tentar Novamente</button>
        </div>`;
        modalsEl.innerHTML = '';
        return;
    }
    if(state.screen === 'lobby'){
        app.innerHTML = renderLobby();
        modalsEl.innerHTML = state.notification?`<div class="notification notif-${state.notification.type}">${state.notification.msg}</div>`:'';
        bindLobby();
        return;
    }
    if(state.screen === 'setup'){
        app.innerHTML = '';
        modalsEl.innerHTML = renderSetup();
        bindSetup();
        return;
    }
    if(state.screen === 'editor'){
        app.innerHTML = renderEditor();
        modalsEl.innerHTML = state.notification?`<div class="notification notif-${state.notification.type}">${state.notification.msg}</div>`:'';
        bindEditor();
        return;
    }
    if(state.screen === 'game'){
        app.innerHTML = renderGame();
        modalsEl.innerHTML = renderModals();
        bindGame();
        // Empurra estado para Firebase apГіs cada render do jogo
        if(state.gameState!=='game_over') pushGameStateToFirebase();
    }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BIND DE EVENTOS POR TELA
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const safeBind = (id, fn) => { const el=document.getElementById(id); if(el) el.onclick=fn; };
const $a2 = s => document.querySelectorAll(s);

// bindFirebaseConfig removida вҖ” credenciais agora sГЈo fixas no cГіdigo

function bindLobby(){
    safeBind('btn-go-setup', () => {
        const n = state.numPlayers;
        const connectedList = Object.values(state.connectedPlayers);
        const sd = Array.from({length:n},(_,i)=>{
            const cp = connectedList.find(p=>p.playerIdx===i);
            return cp ? {name:cp.name, avatar:cp.avatar} : {name:`Jogador ${i+1}`, avatar:PRESET_AVATARS[i]};
        });
        setState({screen:'setup', setupPlayersData:sd});
    });
    safeBind('btn-go-editor', () => setState({screen:'editor'}));
}

function bindSetup(){
    safeBind('btn-back', () => setState({screen:'lobby'}));
    safeBind('btn-start', finalizeSetupAndStart);
    safeBind('btn-cpu', () => {
        const next = !state.vsCpuMode;
        const sd = Array.from({length:state.numPlayers},(_,i)=>({name:`Jogador ${i+1}`,avatar:PRESET_AVATARS[i]}));
        setState({vsCpuMode:next, setupPlayersData:sd});
    });
    const nr=document.getElementById('np-range');
    if(nr) nr.oninput=e=>{
        const n=parseInt(e.target.value);
        const sd=Array.from({length:n},(_,i)=>({name:`Jogador ${i+1}`,avatar:PRESET_AVATARS[i]}));
        setState({numPlayers:n,setupPlayersData:sd});
    };
    const db2=document.getElementById('sel-diff-board');if(db2)db2.onchange=e=>setState({boardDifficulty:e.target.value});
    const dc=document.getElementById('sel-diff-cpu');if(dc)dc.onchange=e=>setState({cpuDifficulty:e.target.value});
    const cf=document.getElementById('chk-fields');if(cf)cf.onchange=e=>setState({enableFields:e.target.checked});
    const catF=document.getElementById('sel-cat-filter');if(catF)catF.onchange=e=>setState({activeGameCategory:e.target.value});
    // Campo de emoji livre (digitaГ§ГЈo direta)
    $a2('.inp-p-av').forEach(el=>el.oninput=e=>{
        const sd=[...state.setupPlayersData];
        sd[e.target.dataset.idx].avatar=e.target.value;
        setState({setupPlayersData:sd},false);
        // Atualiza destaque dos botГөes de sugestГЈo sem re-renderizar tudo
        document.querySelectorAll(`.btn-emoji-sug[data-idx="${e.target.dataset.idx}"]`).forEach(b=>{
            const sel=b.dataset.emoji===e.target.value;
            b.style.background=sel?'rgba(108,99,255,0.25)':'var(--surface2)';
            b.style.borderColor=sel?'rgba(108,99,255,0.5)':'var(--border)';
        });
    });
    // Clique em emoji sugestГЈo preenche o campo e atualiza estado
    $a2('.btn-emoji-sug').forEach(btn=>btn.onclick=e=>{
        e.preventDefault();
        const idx=btn.dataset.idx; const emoji=btn.dataset.emoji;
        const inp=document.querySelector(`.inp-p-av[data-idx="${idx}"]`);
        if(inp) inp.value=emoji;
        const sd=[...state.setupPlayersData]; sd[idx].avatar=emoji;
        setState({setupPlayersData:sd},false);
        // Atualiza destaque visual
        document.querySelectorAll(`.btn-emoji-sug[data-idx="${idx}"]`).forEach(b=>{
            const sel=b.dataset.emoji===emoji;
            b.style.background=sel?'rgba(108,99,255,0.25)':'var(--surface2)';
            b.style.borderColor=sel?'rgba(108,99,255,0.5)':'var(--border)';
        });
    });
    $a2('.inp-p-name').forEach(el=>el.oninput=e=>{const sd=[...state.setupPlayersData];sd[e.target.dataset.idx].name=e.target.value;setState({setupPlayersData:sd},false);});
    $a2('.btn-theme').forEach(btn=>btn.onclick=()=>setState({currentTheme:THEMES[btn.dataset.id]}));
    $a2('.btn-layout').forEach(btn=>btn.onclick=()=>setState({currentLayout:LAYOUTS[btn.dataset.id]}));
}

function bindEditor(){
    safeBind('btn-editor-back', () => setState({screen:'lobby'}));
    safeBind('btn-save-q', saveQuestion);
    safeBind('btn-cancel', ()=>setState({editingId:null,newQ:{type:'obj',category:'Geral',question:'',options:['','','',''],answer:0}}));
    safeBind('btn-wipe', ()=>{if(confirm('вҡ пёҸ Limpar todas as perguntas?'))setState({questions:[]});});
    safeBind('btn-dl', downloadJSON);
    const lj=document.getElementById('inp-json');if(lj)lj.onchange=loadJSON;
    const lt=document.getElementById('inp-txt');if(lt)lt.onchange=loadTXT;
    const qi=document.getElementById('inp-q');if(qi)qi.oninput=e=>setState({newQ:{...state.newQ,question:e.target.value}},false);
    const ci=document.getElementById('inp-cat');if(ci)ci.oninput=e=>setState({newQ:{...state.newQ,category:e.target.value}},false);
    const ti=document.getElementById('inp-type');if(ti)ti.onchange=e=>{const type=e.target.value;let opts=[...state.newQ.options];if(type==='vf')opts=["Verdadeiro","Falso","",""];setState({newQ:{...state.newQ,type,options:opts}},true);};
    $a2('.inp-opt').forEach(el=>el.oninput=e=>{const no=[...state.newQ.options];no[e.target.dataset.i]=e.target.value;setState({newQ:{...state.newQ,options:no}},false);});
    $a2('.rad-ans').forEach(el=>el.onchange=e=>setState({newQ:{...state.newQ,answer:+e.target.dataset.i}},false));
    $a2('.btn-del').forEach(b=>b.onclick=()=>{if(confirm('Apagar?'))setState({questions:state.questions.filter(q=>q.id!=b.dataset.id)});});
    $a2('.btn-edit').forEach(b=>b.onclick=()=>loadEdit(parseFloat(b.dataset.id)));
}

function bindGame(){
    safeBind('open-menu-btn', ()=>setState({isMenuOpen:true}));
    safeBind('btn-close-modal', ()=>setState({isMenuOpen:false}));
    safeBind('btn-restart', ()=>{setState({isMenuOpen:false});finalizeSetupAndStart();});
    safeBind('btn-exit', ()=>{stopTimer();setState({screen:'lobby',isMenuOpen:false,gameState:'waiting_roll'});if(roomRef)roomRef.child('status').set('lobby');});
    safeBind('btn-theme-menu', ()=>setState({isMenuOpen:false,modalContent:'themes'}));
    safeBind('btn-layout-menu', ()=>setState({isMenuOpen:false,modalContent:'layouts'}));
    safeBind('btn-close-themes', ()=>setState({modalContent:null}));
    safeBind('btn-close-layouts', ()=>setState({modalContent:null}));
    safeBind('btn-menu-win', ()=>setState({screen:'lobby',gameState:'waiting_roll'}));
    safeBind('btn-restart-end', finalizeSetupAndStart);
    safeBind('fab-zoom-in', zoomIn);
    safeBind('fab-zoom-out', zoomOut);
    safeBind('fab-present', togglePresentation);
    safeBind('fab-theme', toggleLightMode);
    safeBind('roll-btn', rollDice);
    $a2('.question-option').forEach(b=>b.onclick=()=>handleAnswer(parseInt(b.dataset.answerIndex)));
    $a2('.btn-use-card').forEach(b=>b.onclick=()=>useCard(b.dataset.card));
    $a2('.btn-game-theme').forEach(btn=>btn.onclick=()=>setState({currentTheme:THEMES[btn.dataset.id]}));
    $a2('.btn-game-layout').forEach(btn=>btn.onclick=()=>setState({currentLayout:LAYOUTS[btn.dataset.id]}));
    $a2('.btn-select-target').forEach(b=>b.onclick=()=>{if(state.targetSelectionCallback)state.targetSelectionCallback(parseInt(b.dataset.idx));});
    const bts=$a2('.btn-thief-steal');bts.forEach(b=>b.onclick=()=>performThiefAction('steal'));
    const btw=$a2('.btn-thief-swap');btw.forEach(b=>b.onclick=()=>performThiefAction('swap'));
}

/* в”Җв”Җ Atalho de teclado (EspaГ§o) para rolar dado no host в”Җв”Җ */
document.addEventListener('keydown', e=>{
    if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
    if((e.code==='Space'||e.code==='Enter')&&state.screen==='game'&&state.gameState==='waiting_roll'&&!state.isRolling&&!state.modalContent){
        e.preventDefault(); rollDice();
    }
});

/* в”Җв”Җ INГҚCIO вҖ” updateUI mostra tela connecting imediatamente в”Җв”Җ */
updateUI();
</script>

     o cГіdigo do jogo jГЎ estГЎ definido quando firebase for usado -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>initFirebase();</script>
