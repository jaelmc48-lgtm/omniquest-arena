<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniQuest Arena вҖ” HOST (TelГЈo)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

    <style>
        /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
           VARIГҒVEIS E RESET
        в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
        :root {
            --bg: #0d0f14; --surface: #161a24; --surface2: #1e2333;
            --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.14);
            --accent: #6c63ff; --accent-hi: #8b85ff;
            --red: #ff6b6b; --gold: #ffd166; --green: #06d6a0;
            --text: #e8eaf6; --text-muted: #6b7280; --text-dim: #9ca3af;
            --font-display: 'Bebas Neue', cursive; --font-body: 'DM Sans', sans-serif;
            --radius: 14px; --radius-sm: 8px; --shadow: 0 8px 32px rgba(0,0,0,0.55);
        }
        body.light-mode {
            --bg: #f0f4f8; --surface: #ffffff; --surface2: #e8edf3;
            --border: rgba(0,0,0,0.08); --border-hi: rgba(0,0,0,0.14);
            --text: #1a1d2e; --text-muted: #6b7280; --text-dim: #4b5563;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-body); background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background 0.4s, color 0.4s; }
        .flex { display: flex; } .flex-col { flex-direction: column; } .items-center { align-items: center; }
        .justify-center { justify-content: center; } .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; } .w-full { width: 100%; } .h-full { height: 100%; }
        .text-center { text-align: center; } .font-bold { font-weight: 700; }
        .hidden { display: none !important; } .relative { position: relative; } .absolute { position: absolute; }
        button { border: none; cursor: pointer; transition: transform 0.15s, opacity 0.2s, box-shadow 0.15s; font-family: var(--font-body); }
        button:active { transform: scale(0.97); } button:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-primary { padding: 13px 28px; border-radius: var(--radius); font-weight: 700; font-size: 0.88rem; letter-spacing: 0.6px; text-transform: uppercase; color: white; background: var(--accent); box-shadow: 0 4px 18px rgba(108,99,255,0.3); position: relative; overflow: hidden; }
        .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 55%); pointer-events: none; }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(108,99,255,0.5); transform: translateY(-1px); }
        .btn-menu { width: 100%; padding: 12px 16px; margin-bottom: 6px; border-radius: var(--radius-sm); text-align: left; font-weight: 600; font-size: 0.88rem; background: var(--surface2); color: var(--text); border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .btn-menu:hover { background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.4); }
        input[type="text"], textarea, select { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-hi); font-family: var(--font-body); background: var(--surface); color: var(--text); font-size: 0.88rem; transition: border-color 0.2s, box-shadow 0.2s; }
        input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.18); }
        input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
        select option { background: var(--surface); color: var(--text); }
        label.form-lbl { display: block; margin-bottom: 6px; font-size: 0.68rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }

        /* в”Җв”Җ DADO 3D в”Җв”Җ */
        .scene { perspective: 600px; width: 80px; height: 80px; margin: 16px auto; }
        .cube { transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 100%; height: 100%; position: relative; }
        .cube__face { position: absolute; width: 100%; height: 100%; border-radius: 14px; background: linear-gradient(135deg, #242840 0%, #181b2a 100%); border: 1.5px solid rgba(108,99,255,0.45); display: flex; justify-content: center; align-items: center; backface-visibility: hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), inset 0 -2px 6px rgba(0,0,0,0.3); }
        .dice-dots { display: grid; width: 54px; height: 54px; padding: 9px; gap: 4px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 7px rgba(255,209,102,0.65); }
        .dots-1 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); }
        .dots-1 .dot:nth-child(1) { grid-column:2; grid-row:2; }
        .dots-2 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(2,1fr); }
        .dots-2 .dot:nth-child(1) { grid-column:1; grid-row:1; }
        .dots-2 .dot:nth-child(2) { grid-column:2; grid-row:2; }
        .dots-3 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); }
        .dots-3 .dot:nth-child(1) { grid-column:1; grid-row:1; }
        .dots-3 .dot:nth-child(2) { grid-column:2; grid-row:2; }
        .dots-3 .dot:nth-child(3) { grid-column:3; grid-row:3; }
        .dots-4 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(2,1fr); }
        .dots-5 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); }
        .dots-5 .dot:nth-child(1) { grid-column:1; grid-row:1; }
        .dots-5 .dot:nth-child(2) { grid-column:3; grid-row:1; }
        .dots-5 .dot:nth-child(3) { grid-column:2; grid-row:2; }
        .dots-5 .dot:nth-child(4) { grid-column:1; grid-row:3; }
        .dots-5 .dot:nth-child(5) { grid-column:3; grid-row:3; }
        .dots-6 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(3,1fr); }
        .cube__face--front  { transform: rotateY(  0deg) translateZ(40px); }
        .cube__face--right  { transform: rotateY( 90deg) translateZ(40px); }
        .cube__face--back   { transform: rotateY(180deg) translateZ(40px); }
        .cube__face--left   { transform: rotateY(-90deg) translateZ(40px); }
        .cube__face--top    { transform: rotateX( 90deg) translateZ(40px); }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(40px); }
        .show-1 { transform: translateZ(-40px) rotateY(   0deg); }
        .show-6 { transform: translateZ(-40px) rotateY( 180deg); }
        .show-2 { transform: translateZ(-40px) rotateX( -90deg); }
        .show-5 { transform: translateZ(-40px) rotateX(  90deg); }
        .show-3 { transform: translateZ(-40px) rotateY( -90deg); }
        .show-4 { transform: translateZ(-40px) rotateY(  90deg); }
        .rolling .cube { animation: spin-3d 0.55s linear infinite; }
        @keyframes spin-3d { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(480deg); } }

        /* в”Җв”Җ LAYOUT PRINCIPAL в”Җв”Җ */
        .game-wrapper { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .sidebar { width: 295px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); z-index: 10; transition: background 0.5s; position: relative; }
        .sidebar-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
        .player-list { overflow-y: auto; flex: 1; padding: 8px; border-top: 1px solid var(--border); }
        .main-area { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 12px; transform-origin: center center; transition: transform 0.2s ease; }

        /* в”Җв”Җ TABULEIRO в”Җв”Җ */
        .board-container { width: 100%; max-width: 90vh; aspect-ratio: 1/1; border: 1.5px solid var(--border-hi); border-radius: var(--radius); padding: 5px; overflow: hidden; box-shadow: var(--shadow), 0 0 50px rgba(108,99,255,0.07); }
        .board-grid { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); gap: 2px; width: 100%; height: 100%; }
        .board-horizontal { display: flex; gap: 4px; overflow-x: auto; padding: 20px; height: 100%; width: 100%; align-items: center; }
        .tile { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border-radius: 4px; border: 1px solid transparent; overflow: hidden; transition: transform 0.15s; background: rgba(255,255,255,0.025); cursor: default; }
        .tile:hover { transform: scale(1.06); z-index: 2; }
        .tile-horizontal { min-width: 80px; height: 80px; flex-shrink: 0; }
        .tile-question { background: rgba(108,99,255,0.09); border: 1px solid rgba(108,99,255,0.28) !important; }
        .tile-empty { background: rgba(255,255,255,0.015); border: 1px dashed rgba(255,255,255,0.06) !important; }
        .tile-special { border: 1px solid rgba(255,255,255,0.18) !important; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); }
        .tile-number { position: absolute; top: 2px; left: 3px; opacity: 0.28; font-size: 8px; pointer-events: none; color: var(--text-dim); }
        .tile-icon { font-size: 1.1rem; z-index: 0; pointer-events: none; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }
        .players-on-tile { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 2px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 2px; pointer-events: none; }
        .player-token { width: 17px; height: 17px; background: var(--surface2); border-radius: 50%; border: 2px solid rgba(255,255,255,0.55); display: flex; align-items: center; justify-content: center; font-size: 9px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5; }
        .tile-tooltip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 5px; white-space: nowrap; z-index: 100; pointer-events: none; display: none; }
        .tile:hover .tile-tooltip { display: block; }
        .arrow-dir { position: absolute; font-size: 9px; color: rgba(255,255,255,0.18); font-weight: 900; z-index: 2; pointer-events: none; }
        .arrow-right { right: 2px; top: 50%; transform: translateY(-50%); } .arrow-left { left: 2px; top: 50%; transform: translateY(-50%); }
        .arrow-up { top: 0; left: 50%; transform: translateX(-50%); } .arrow-down { bottom: 0; left: 50%; transform: translateX(-50%); }
        .field-banner { position: absolute; top: 0; left: 0; right: 0; padding: 9px 12px; text-align: center; color: white; font-weight: 700; font-size: 0.82rem; z-index: 50; animation: slideDown 0.4s; letter-spacing: 0.4px; }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .fog-effect .tile-number, .fog-effect .tile-icon { display: none; }
        .fog-effect .tile { background: rgba(71,85,105,0.25) !important; border-color: rgba(71,85,105,0.35) !important; }

        /* в”Җв”Җ PLAYER CARDS в”Җв”Җ */
        .player-card { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: var(--radius-sm); margin-bottom: 5px; border: 1px solid transparent; background: rgba(255,255,255,0.025); transition: all 0.2s; }
        .player-card.active { background: rgba(108,99,255,0.1); border-color: rgba(108,99,255,0.38); }
        .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.15rem; border: 2px solid transparent; flex-shrink: 0; }
        .player-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .player-name { font-weight: 600; font-size: 0.83rem; display: flex; justify-content: space-between; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-status { display: flex; gap: 3px; font-size: 0.63rem; margin-top: 3px; flex-wrap: wrap; }
        .status-badge { padding: 2px 7px; border-radius: 20px; color: white; font-weight: 700; letter-spacing: 0.3px; }
        /* Badge online/offline do jogador */
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-left: 4px; box-shadow: 0 0 5px #22c55e; }
        .offline-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; display: inline-block; margin-left: 4px; }

        /* в”Җв”Җ MODAIS в”Җв”Җ */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(7px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; animation: fadeIn 0.22s; }
        .modal-content { background: var(--surface); width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.65), 0 0 0 1px var(--border-hi); animation: slideUp 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-height: 90vh; display: flex; flex-direction: column; }
        .modal-header { padding: 17px 20px; color: white; font-weight: 700; display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; letter-spacing: 0.3px; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .theme-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 6px; display: flex; flex-direction: column; align-items: center; gap: 5px; background: var(--surface2); color: var(--text); font-size: 0.78rem; font-weight: 600; transition: all 0.2s; }
        .theme-btn:hover { border-color: var(--accent); } .theme-btn.active { border-color: var(--accent); background: rgba(108,99,255,0.15); }
        .theme-preview { width: 100%; height: 26px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); }
        .legend-section-title { font-weight: 800; color: var(--accent); margin: 18px 0 8px 0; padding-bottom: 5px; border-bottom: 1.5px solid rgba(108,99,255,0.2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.2px; }
        .legend-section-title:first-child { margin-top: 0; }
        .legend-item { display: flex; align-items: center; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .legend-icon { width: 34px; text-align: center; font-size: 1.25rem; flex-shrink: 0; }
        .legend-info b { display: block; font-size: 0.83rem; color: var(--text); font-weight: 600; }
        .legend-info span { font-size: 0.72rem; color: var(--text-muted); }

        /* в”Җв”Җ EDITOR в”Җв”Җ */
        .editor-container { display: flex; height: 100vh; flex-direction: column; background: var(--bg); }
        .editor-header { background: var(--surface); border-bottom: 1px solid var(--border); color: var(--text); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .editor-main { display: flex; flex: 1; overflow: hidden; }
        .editor-form { width: 340px; min-width: 300px; background: var(--surface); padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .editor-list { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); }
        .btn-editor-action { padding: 7px 13px; border-radius: 7px; font-size: 0.78rem; font-weight: 600; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; letter-spacing: 0.3px; }
        .q-card { background: var(--surface); padding: 14px; border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; transition: border-color 0.2s; }
        .q-card:hover { border-color: var(--border-hi); }
        .setup-row { display: flex; gap: 10px; margin-bottom: 10px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); align-items: flex-end; }
        .lbl-setup { font-size: 0.63rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
        /* в”Җв”Җ NOTIFICAГҮГ•ES E MISC в”Җв”Җ */
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 11px 22px; border-radius: 50px; color: white; font-weight: 700; font-size: 0.83rem; letter-spacing: 0.3px; box-shadow: 0 8px 28px rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; gap: 8px; animation: notifIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; max-width: 90vw; }
        .notif-success { background: linear-gradient(135deg, #06d6a0, #059669); }
        .notif-error   { background: linear-gradient(135deg, #ff6b6b, #dc2626); }
        .notif-info    { background: linear-gradient(135deg, #6c63ff, #4f46e5); }
        .notif-warning { background: linear-gradient(135deg, #ffd166, #f59e0b); color: #1a1a1a; }
        .menu-bg { position: absolute; inset: 0; overflow: hidden; background: radial-gradient(ellipse at 25% 35%, rgba(108,99,255,0.13) 0%, transparent 52%), radial-gradient(ellipse at 78% 72%, rgba(255,107,107,0.08) 0%, transparent 48%), var(--bg); }
        .menu-bg::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px); background-size: 30px 30px; }
        .turn-name { font-family: var(--font-display); font-size: 2rem; letter-spacing: 1px; line-height: 1; color: var(--text); margin-bottom: 14px; text-align: center; word-break: break-word; }
        .question-option { display: flex; align-items: center; gap: 12px; padding: 13px 16px; margin-bottom: 8px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface2); width: 100%; text-align: left; transition: all 0.18s; color: var(--text); font-size: 0.88rem; }
        .question-option.correct { border-color: var(--green) !important; background: rgba(6,214,160,0.15) !important; }
        .question-option.wrong   { border-color: var(--red) !important; background: rgba(255,107,107,0.15) !important; }
        .opt-letter { width: 30px; height: 30px; min-width: 30px; background: var(--accent); color: white; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; }
        .timer-bar-container { height: 3px; background: rgba(255,255,255,0.07); width: 100%; }
        .timer-bar { height: 100%; background: var(--green); transition: width 1s linear; }
        .fab-container { position: absolute; top: 16px; right: 16px; z-index: 10; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .fab-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border: 1.5px solid var(--border-hi); background: var(--surface); box-shadow: 0 4px 14px rgba(0,0,0,0.4); transition: all 0.2s; }
        .fab-btn:hover { transform: scale(1.1); }
        .presentation-mode .sidebar { display: none !important; }
        .presentation-mode .main-area { padding: 4px; }
        .presentation-mode .board-container { max-width: 98vmin; max-height: 98vmin; }
        .zoom-badge { position: absolute; bottom: 18px; left: 18px; z-index: 20; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); opacity: 0.5; pointer-events: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(22px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes notifIn { from { transform: translateX(-50%) translateY(-18px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes fieldPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
        .field-anim { animation: fieldPulse 0.4s ease-in-out 3; }
        ::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }


        /* в”Җв”Җ SALA (lobby) в”Җв”Җ */
        .lobby-screen { position:fixed; inset:0; background:var(--bg); z-index:290; display:flex; align-items:center; justify-content:center; padding:20px; flex-direction:column; gap:16px; }
        .room-code-display { font-family:var(--font-display); font-size:4.5rem; letter-spacing:10px; color:var(--gold); text-shadow:0 0 30px rgba(255,209,102,0.4); }
        .connected-players-list { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; width:100%; max-width:480px; }

/* в”Җв”Җ GeraГ§ГЈo dos layouts de tabuleiro в”Җв”Җ */
function generateSnakeMap(){
    const m=[];
    for(let r=0;r<10;r++){
        const row=r%2===0?Array.from({length:10},(_,c)=>c):Array.from({length:10},(_,c)=>9-c);
        row.forEach(c=>m.push({col:c+1,row:10-r}));
    }
    return m;
}
function generatePerimeterSpiral(){
    const grid=Array.from({length:10},()=>Array(10).fill(null));
    let idx=0,t=0,b=9,l=0,r=9;
    while(idx<100){
        for(let c=l;c<=r&&idx<100;c++) grid[t][c]=idx++;
        t++;
        for(let row=t;row<=b&&idx<100;row++) grid[row][r]=idx++;
        r--;
        for(let c=r;c>=l&&idx<100;c--) grid[b][c]=idx++;
        b--;
        for(let row=b;row>=t&&idx<100;row--) grid[row][l]=idx++;
        l++;
    }
    const map=[];
    for(let i=0;i<100;i++){
        for(let row=0;row<10;row++){
            for(let col=0;col<10;col++){
                if(grid[row][col]===i) map[i]={col:col+1,row:row+1};
            }
        }
    }
    return map;
}
function generateVerticalMap(){
    const m=[];
    for(let c=0;c<10;c++){
        const col=c%2===0?Array.from({length:10},(_,r)=>r):Array.from({length:10},(_,r)=>9-r);
        col.forEach(r=>m.push({col:c+1,row:r+1}));
    }
    return m;
}

    VERTICAL: generateVerticalMap(),
};

   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function generateRoomCode(){
    // CГіdigo de 4 letras maiГәsculas fГЎcil de digitar
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

function initFirebase(){
    try {
        if(firebase.apps.length === 0){
            firebase.initializeApp(FIREBASE_CONFIG);
        }
        db = firebase.database();

        // Usa .on() em vez de .once() вҖ” .once() frequentemente retorna false
        // antes do WebSocket estabelecer, travando a tela connecting indefinidamente.
        // A flag roomCreated garante que createRoom() sГі execute uma vez.
        let roomCreated = false;
        db.ref('.info/connected').on('value', snap => {
            if(snap.val() === true && !roomCreated){
                roomCreated = true;
                db.ref('.info/connected').off(); // para o listener apГіs criar
                createRoom();
            }
        });

        // Timeout de seguranГ§a: 8s sem conectar mostra tela de erro
        setTimeout(() => {
            if(state.screen === 'connecting'){
                setState({ screen: 'error_firebase' });
            }
        }, 8000);

        return true;
    } catch(e) {
        console.error('Firebase init error:', e);
        setState({ screen: 'error_firebase' });
        return false;
    }
}

function createRoom(){
    const code = generateRoomCode();
    roomRef = db.ref(`rooms/${code}`);
    actionRef = db.ref(`rooms/${code}/actions`);

    // Inicializa sala vazia no Firebase
    roomRef.set({
        code,
        status: 'lobby',
        hostOnline: true,
        gameState: null,
        connectedPlayers: {},
        lastAction: null,
    });

    // Limpa sala ao sair
    roomRef.child('hostOnline').onDisconnect().set(false);

    // Ouve jogadores entrando
    roomRef.child('connectedPlayers').on('value', snap => {
        const data = snap.val() || {};
        state.connectedPlayers = data;
        updateUI();
    });

    // Ouve aГ§Гөes dos celulares (ROLL, ANSWER, USE_CARD, SELECT_TARGET)
    actionRef.on('child_added', snap => {
        const action = snap.val();
        if(!action) return;
        // Remove apГіs processar para nГЈo re-executar
        snap.ref.remove();
        handlePlayerAction(action);
    });

    setState({ screen: 'lobby', roomCode: code });
    showNotification(`Sala ${code} criada!`, 'success');
}

/* в”Җв”Җ Publica estado do jogo no Firebase para os celulares lerem в”Җв”Җ */
function pushGameStateToFirebase(){
    if(!roomRef) return;
    // Serializa apenas o necessГЎrio (nГЈo funГ§Гөes, nГЈo timerInterval)
    const snap = {
        players: state.players,
        turnIndex: state.turnIndex,
        turnDirection: state.turnDirection,
        gameState: state.gameState,
        diceValue: state.diceValue,
        diceDisplay: state.diceDisplay,
        isRolling: state.isRolling,
        currentQuestion: state.currentQuestion,
        shuffledOptions: state.shuffledOptions,
        hiddenOptionIndices: state.hiddenOptionIndices,
        timer: state.timer,
        isTimerFrozen: state.isTimerFrozen,
        activeField: state.activeField,
        fieldAnimActive: state.fieldAnimActive,
        modalContent: state.modalContent,
        rouletteCard: state.rouletteCard || null,
        notification: state.notification,
        numPlayers: state.numPlayers,
        boardDifficulty: state.boardDifficulty,
        currentTheme: state.currentTheme,
        currentLayout: state.currentLayout,
        wormholePairs: state.wormholePairs,
        // Manda o tabuleiro como objeto indexado (Firebase nГЈo aceita arrays com buracos bem)
        gameBoard: state.gameBoard,
        gameStatus: 'running',
        updatedAt: firebase.database.ServerValue.TIMESTAMP,
    };
    roomRef.child('gameState').set(snap);
}

/* в”Җв”Җ Recebe aГ§ГЈo vinda de um celular в”Җв”Җ */
function handlePlayerAction(action){
    const { type, playerIdx, payload } = action;

    // Verifica se Г© a vez deste jogador (para roll e answer)
    if(type === 'ROLL'){
        if(state.gameState !== 'waiting_roll' || state.isRolling) return;
        if(state.players[state.turnIndex] && !state.players[state.turnIndex].isCpu){
            rollDice();
        }
    }
    else if(type === 'ANSWER'){
        if(state.gameState !== 'answering' || state.isProcessing) return;
        handleAnswer(payload.shuffledIdx);
    }
    else if(type === 'USE_CARD'){
        useCard(payload.cardId);
    }
    else if(type === 'SELECT_TARGET'){
        if(state.targetSelectionCallback){
            state.targetSelectionCallback(payload.targetIdx);
        }
    }
    else if(type === 'THIEF_ACTION'){
        performThiefAction(payload.action);
    }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   NOTIFICAГҮГ•ES
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let notifTimeout;
const showNotification = (msg, type='info', duration=3000) => {
    if(notifTimeout) clearTimeout(notifTimeout);
    setState({notification:{msg,type}});
    notifTimeout = setTimeout(() => setState({notification:null}), duration);
};

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TIMER
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function timeOutFailure(){ showNotification("Tempo Esgotado!","error"); handleAnswer(-1); }
function startTimer(){
    clearInterval(state.timerInterval);
    const initialTime = state.reducedTimeForNext ? state.reducedTimeForNext : 60;
    setState({timer:initialTime, isTimerFrozen:false, reducedTimeForNext:null}, true);
    const interval = setInterval(()=>{
        if(state.isTimerFrozen) return;
        if(state.timer <= 0){ clearInterval(interval); timeOutFailure(); }
        else {
            state.timer -= 1;
            const tEl = document.getElementById('q-timer-disp');
            const bEl = document.getElementById('q-timer-bar');
            if(tEl) tEl.innerText = `${state.timer}s`;
            if(bEl){ bEl.style.width = `${(state.timer/initialTime)*100}%`; if(state.timer<15) bEl.style.backgroundColor='#ff6b6b'; }
            // Atualiza timer nos celulares a cada 5s para economizar
            if(state.timer % 5 === 0) pushTimerToFirebase();
        }
    }, 1000);
    state.timerInterval = interval;
}
function stopTimer(){ clearInterval(state.timerInterval); }
function pushTimerToFirebase(){
    if(!roomRef) return;
    roomRef.child('gameState/timer').set(state.timer);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MOVIMENTO E LГ“GICA DO TABULEIRO (idГӘntica ao v7)
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function animateMove(playerIndex, startPos, endPos, onComplete){
    const stepTime=150; const direction=endPos>startPos?1:-1; let current=startPos;
    const step=()=>{
        if(current===endPos){ if(onComplete) onComplete(); return; }
        current+=direction;
        const np=[...state.players]; np[playerIndex].position=current;
        np.forEach((p,idx)=>{if(idx!==playerIndex&&p.position===current&&p.isStuck){p.isStuck=false;p.position=Math.min(99,p.position+1);showNotification(`${np[playerIndex].name} resgatou ${p.name}!`,'success');}});
        setState({players:np});
        setTimeout(step,stepTime);
    };
    step();
}

function checkTile(pos){
    const tile=state.gameBoard[pos]; const field=state.activeField?state.activeField.type:null;
    const IMMUNITY_PROTECTED=['LOSE_TURN','WAIT_2','LEAK_TURN','ATTACK','CANNON','SKULL','THIEF','QUICKSAND','RESET_START','DIE_CURSE','BACK_2','BACK_3','SWAP'];
    if(field==='CALM'&&IMMUNITY_PROTECTED.includes(tile.type.id)){showNotification("Calmaria: Efeito anulado!","success");nextTurn();return;}
    if(field==='DESPAIR'&&['ROULETTE','ADVANCE_3','DOUBLE_JUMP','FIELD_SPOT'].includes(tile.type.id)){showNotification("Desespero: BГҙnus anulado!","error");nextTurn();return;}
    if(!tile){nextTurn();return;}
    if(tile.type.id==='QUESTION') askQuestion();
    else if(tile.type.id==='EMPTY'){showNotification("Descanso...",'info',1000);setTimeout(nextTurn,1000);}
    else if(tile.type.id==='FIELD_SPOT') startFieldAnimation();
    else if(tile.type.id!=='NONE') resolveSpecial(tile.type);
    else nextTurn();
}

function startFieldAnimation(){
    setState({fieldAnimActive:true});
    setTimeout(()=>{ setState({fieldAnimActive:false}); activateField(); }, 1500);
}
function activateField(){
    const types=Object.keys(FIELDS); const randType=types[Math.floor(Math.random()*types.length)];
    const duration=state.boardDifficulty==='SIMPLE'?4:8;
    setState({activeField:{type:randType,turns:duration}});
    showNotification(`Campo Ativado: ${FIELDS[randType].name}!`,'info',4000);
    setTimeout(nextTurn,1500);
}

function rollDice(){
    if(state.gameState!=='waiting_roll'||state.isRolling) return;
    const pIdx=state.turnIndex; const p=state.players[pIdx]; const field=state.activeField?state.activeField.type:null;
    if(field==='MAGNET'&&p.position>1){const np=[...state.players];np[pIdx].position-=2;setState({players:np});showNotification("Magneta puxou vocГӘ para trГЎs!","warning");}
    if(p.isStuck){
        setState({isRolling:true});
        setTimeout(()=>{
            const roll=Math.floor(Math.random()*6)+1;
            setState({diceValue:roll,diceDisplay:String(roll),isRolling:false});
            if(roll%2===0){const np=[...state.players];np[pIdx].isStuck=false;setState({players:np});showNotification("Saiu da Areia MovediГ§a (Par)!","success");handleMove(roll);}
            else{showNotification("Ainda preso (ГҚmpar)...","warning");nextTurn();}
        },1000); return;
    }
    const np=[...state.players];
    if(p.immunityTurns>0) np[pIdx].immunityTurns--;
    if(p.reverseEffectTurns>0) np[pIdx].reverseEffectTurns--;
    if(p.skullTurns>0){
        const skullStep=5-p.skullTurns; const skullBack=Math.max(1,skullStep);
        np[pIdx].skullTurns--; np[pIdx].position=Math.max(0,p.position-skullBack);
        showNotification(`MaldiГ§ГЈo da Caveira! Volta ${skullBack} casa(s)!`,"error");
    }
    if(p.leakStacks&&p.leakStacks.length>0){
        let totalBack=0;
        np[pIdx].leakStacks=np[pIdx].leakStacks.map(s=>{totalBack++;return s-1;}).filter(s=>s>0);
        if(p.immunityTurns>0){showNotification(`Sangramento bloqueado!`,'success');np[pIdx].leakStacks=[];}
        else if(totalBack>0){np[pIdx].position=Math.max(0,p.position-totalBack);showNotification(`${p.name} sangra! -${totalBack} casa(s)!`,'error');}
    }
    setState({players:np},false);
    if(p.skipTurns>0){showNotification(`${p.name} perdeu a vez! (${p.skipTurns})`,'warning');const np2=[...state.players];np2[pIdx].skipTurns--;setState({players:np2});nextTurn();return;}
    setState({isRolling:true});
    setTimeout(()=>{
        let roll1=Math.floor(Math.random()*6)+1; let roll2=Math.floor(Math.random()*6)+1;
        let finalRoll=roll1; let display=`${roll1}`;
        if(p.hasLuckyDice){finalRoll=roll1+roll2;display=`${roll1}+${roll2}=${finalRoll}`;const r=[...state.players];r[pIdx].hasLuckyDice=false;setState({players:r});showNotification("Dado da Sorte! +"+finalRoll,"success");}
        else if(p.hasUnluckyDice){finalRoll=-(roll1);display=`-${roll1}`;const r=[...state.players];r[pIdx].hasUnluckyDice=false;setState({players:r});showNotification("Dado do Azar! -"+roll1,"error");}
        if(field==='RANDOM_TRIP'){finalRoll=0;display="???";}
        setState({diceValue:Math.max(1,Math.abs(finalRoll)||1),diceDisplay:display,isRolling:false});
        if(field==='RANDOM_TRIP'){
            const savedField=state.activeField; setState({activeField:null},false);
            const rPos=Math.floor(Math.random()*80)+10;
            animateMove(pIdx,state.players[pIdx].position,rPos,()=>{setState({activeField:savedField},false);setTimeout(()=>checkTile(rPos),500);});
            return;
        }
        const pNow=state.players[pIdx];
        if(pNow.dieCurseTurns>0){
            const nc=[...state.players];nc[pIdx].dieCurseTurns--;
            showNotification(`MaldiГ§ГЈo do Dado! Volta ${Math.abs(finalRoll)} casas!`,'error');
            let moves=Math.abs(finalRoll)*-1;
            if(pNow.nextMoveMultiplier>1){moves*=pNow.nextMoveMultiplier;nc[pIdx].nextMoveMultiplier=1;}
            setState({players:nc});
            const fPos=Math.max(0,pNow.position+moves);
            animateMove(pIdx,pNow.position,fPos,()=>setTimeout(nextTurn,500));
        } else { handleMove(finalRoll); }
    },1000);
}

function handleMove(roll){
    setState({gameState:'moving'});
    const pIdx=state.turnIndex; const p=state.players[pIdx]; const field=state.activeField?state.activeField.type:null;
    let moves=roll;
    if(field==='INVERTED'&&roll>0){moves=roll*-1;showNotification("Mundo Invertido: Andando para trГЎs!","warning");}
    if(p.nextMoveMultiplier>1){moves*=p.nextMoveMultiplier;const np=[...state.players];np[pIdx].nextMoveMultiplier=1;setState({players:np});showNotification(`Pulo Duplo!`,'success');}
    let startPos=p.position; let finalPos=Math.max(0,Math.min(99,p.position+moves));
    if(field==='ODD_PARTIAL'&&finalPos%2!==0){finalPos=Math.min(99,finalPos+1);showNotification("ГҚMPAR-cial: Ajustado para par","info");}
    animateMove(pIdx,startPos,finalPos,()=>{
        if(finalPos===99){setState({gameState:'game_over'});pushGameStateToFirebase();return;}
        setTimeout(()=>{
            if(state.wormholePairs[finalPos]!==undefined){
                const dest=state.wormholePairs[finalPos]; const np=[...state.players]; np[pIdx].position=dest; setState({players:np});
                showNotification("Buraco de Minhoca! Teletransporte!","info",2000); setTimeout(()=>checkTile(dest),1500);
            } else checkTile(finalPos);
        },500);
    });
}

function openTargetSelection(callback){
    const pIdx=state.turnIndex;
    if(state.numPlayers===1){callback(0);return;}
    // CPU seleciona automaticamente
    if(state.players[pIdx].isCpu){const opp=state.players.map((_,i)=>i).filter(i=>i!==pIdx);callback(opp[Math.floor(Math.random()*opp.length)]);return;}
    setState({modalContent:'target_selection',targetSelectionCallback:callback});
    pushGameStateToFirebase(); // celular do jogador verГЎ o modal
}

function performThiefAction(action){
    const pIdx=state.turnIndex; const targetIdx=state.thiefTargetIdx;
    const np=[...state.players]; const me=np[pIdx]; const target=np[targetIdx];
    if(action==='steal'){me.cards=[...me.cards,...target.cards];target.cards=[];showNotification("VocГӘ roubou todas as cartas!","success");}
    else if(action==='swap'){const temp=[...me.cards];me.cards=[...target.cards];target.cards=temp;showNotification("Cartas trocadas!","info");}
    setState({players:np,modalContent:null,thiefTargetIdx:null});setTimeout(nextTurn,1500);
}

function resolveSpecial(effect){
    const pIdx=state.turnIndex; const p=state.players[pIdx]; const field=state.activeField?state.activeField.type:null;
    if(p.skullTurns>0&&['ADVANCE_3','ROULETTE','DOUBLE_JUMP'].includes(effect.id)){showNotification("A Caveira consumiu seu bГҙnus!","error");setTimeout(nextTurn,1500);return;}
    const REVERSE_EFFECTS=['ATTACK','CANNON','DO_NOT_PASS','UNLUCKY_DICE'];
    const applyHarm=(targetIdx,actionFunc,actionName,isReversible=false)=>{
        const target=state.players[targetIdx];
        if(target.immunityTurns>0){showNotification(`${target.name} Г© imune a ${actionName}!`,"info");}
        else if(isReversible&&target.reverseEffectTurns>0){showNotification(`${target.name} refletiu ${actionName}!`,"warning");actionFunc(pIdx);}
        else{actionFunc(targetIdx);}
    };
    const energyMult=(field==='ENERGY')?2:1;
    switch(effect.id){
        case 'ADVANCE_3': animateMove(pIdx,p.position,Math.min(99,p.position+3),()=>setTimeout(nextTurn,500));break;
        case 'BACK_2': if(p.immunityTurns>0){showNotification("Imune!","success");setTimeout(nextTurn,1000);}else animateMove(pIdx,p.position,Math.max(0,p.position-2),()=>setTimeout(nextTurn,500));break;
        case 'BACK_3': if(p.immunityTurns>0){showNotification("Imune!","success");setTimeout(nextTurn,1000);}else animateMove(pIdx,p.position,Math.max(0,p.position-3),()=>setTimeout(nextTurn,500));break;
        case 'ROULETTE':{const count=(field==='DOUBLE_BONUS')?2:1;setState({modalContent:'roulette',rouletteCard:null,rouletteCount:count});setTimeout(()=>finishRoulette(count),2000);break;}
        case 'LOSE_TURN': if(p.immunityTurns===0){const np=[...state.players];np[pIdx].skipTurns+=(1*energyMult);setState({players:np});showNotification("Perca a vez!","error");}else showNotification("Imune!","success");setTimeout(nextTurn,1500);break;
        case 'WAIT_2': if(p.immunityTurns===0){const np=[...state.players];np[pIdx].skipTurns+=(2*energyMult);setState({players:np});showNotification("Espere 2 turnos!","error");}else showNotification("Imune!","success");setTimeout(nextTurn,1500);break;
        case 'LEAK_TURN': if(p.immunityTurns===0){const np=[...state.players];if(!np[pIdx].leakStacks)np[pIdx].leakStacks=[];np[pIdx].leakStacks.push(4);setState({players:np});showNotification("Sangramento cumulativo!","error");}else showNotification("Imune!","success");setTimeout(nextTurn,1500);break;
        case 'DOUBLE_Q':{const npQ=[...state.players];npQ[pIdx].questionsToAnswer=2;setState({players:npQ});showNotification("Pergunta Dupla!","info",2000);setTimeout(askQuestion,2000);break;}
        case 'DOUBLE_JUMP':{const npJ=[...state.players];npJ[pIdx].nextMoveMultiplier=2;setState({players:npJ});showNotification("Pulo Duplo prГіx.","success");setTimeout(nextTurn,1500);break;}
        case 'SWAP':
            if(p.immunityTurns>0){showNotification("Imune Г  Troca!","success");setTimeout(nextTurn,1000);break;}
            openTargetSelection(tIdx=>{
                const np=[...state.players];const target=np[tIdx];
                if(target.position<=p.position){showNotification("Troca invГЎlida: sГі com jogadores Г  frente!","warning");setState({modalContent:null});setTimeout(nextTurn,1500);}
                else{const tmp=np[pIdx].position;np[pIdx].position=np[tIdx].position;np[tIdx].position=tmp;setState({players:np,modalContent:null});showNotification(`Trocou com ${np[tIdx].name}!`,"info");setTimeout(nextTurn,1500);}
            }); break;
        case 'CANNON':{const _em=energyMult;openTargetSelection(tIdx=>{applyHarm(tIdx,idx=>{const np=[...state.players];np[idx].position=Math.max(0,np[idx].position-(2*_em));setState({players:np});showNotification(`${np[idx].name} atingido!`,"error");},"CanhГЈo",true);setState({modalContent:null});setTimeout(nextTurn,2000);});break;}
        case 'DO_NOT_PASS': openTargetSelection(tIdx=>{applyHarm(tIdx,idx=>{const np=[...state.players];np[idx].skipTurns+=(2*energyMult);setState({players:np});showNotification(`${np[idx].name} bloqueado!`,"error");},"Bloqueio",true);setState({modalContent:null});setTimeout(nextTurn,2000);});break;
        case 'REVERSE_PATH': if(state.numPlayers>2){setState({turnDirection:state.turnDirection*-1});showNotification("Ordem dos turnos invertida!","warning");}else showNotification("Inverter requer 3+ jogadores!","info");setTimeout(nextTurn,1500);break;
        case 'SKULL': if(p.immunityTurns===0){const np=[...state.players];np[pIdx].skullTurns=4;setState({players:np});showNotification("MaldiГ§ГЈo da Caveira (4 turnos crescente)!","error");}else showNotification("Imune Г  MaldiГ§ГЈo!","success");setTimeout(nextTurn,1500);break;
        case 'THIEF':
            openTargetSelection(tIdx=>{
                const np=[...state.players];const me=np[pIdx];const target=np[tIdx];
                if(target.immunityTurns>0){showNotification(`${target.name} Г© imune!`,"info");setTimeout(nextTurn,2000);}
                else if(me.cards.length===0&&target.cards.length>0){me.cards=[...target.cards];target.cards=[];showNotification("VocГӘ roubou as cartas!","success");setState({players:np,modalContent:null});setTimeout(nextTurn,2000);}
                else if(me.cards.length>0&&target.cards.length>0){if(me.isCpu){const stolen=[...target.cards];me.cards=[...me.cards,...stolen];target.cards=[];showNotification("CPU roubou suas cartas!","error");setState({players:np,modalContent:null});setTimeout(nextTurn,2000);}else setState({thiefTargetIdx:tIdx,modalContent:'thief_action'});}
                else{showNotification("Nada para roubar/trocar.","warning");setState({modalContent:null});setTimeout(nextTurn,2000);}
            }); break;
        case 'QUICKSAND':{const npSand=[...state.players];npSand[pIdx].isStuck=true;setState({players:npSand});showNotification("Preso na Areia MovediГ§a!","warning");setTimeout(nextTurn,1500);break;}
        case 'WORMHOLE': setTimeout(nextTurn,500);break;
        case 'RESET_START': animateMove(pIdx,p.position,Math.floor(Math.random()*10),()=>{showNotification("Voltou ao inГӯcio!","error");setTimeout(nextTurn,1000);});break;
        case 'ATTACK':{
            const npAtt=[...state.players];
            npAtt.forEach((pl,i)=>{if(i!==pIdx){if(pl.immunityTurns>0){showNotification(`${pl.name} defendeu!`,'info');}else if(pl.reverseEffectTurns>0){npAtt[pIdx].position=Math.max(0,npAtt[pIdx].position-state.diceValue);}else{pl.position=Math.max(0,pl.position-(state.diceValue*energyMult));}}});
            setState({players:npAtt});showNotification("Ataque em ГЎrea!","info",2000);setTimeout(nextTurn,2000);break;
        }
        case 'DIE_CURSE': if(p.immunityTurns===0){const np=[...state.players];np[pIdx].dieCurseTurns=3;setState({players:np});showNotification("MaldiГ§ГЈo do Dado (3 turnos)!","error");}else showNotification("Imune!","success");setTimeout(nextTurn,1500);break;
        default: nextTurn();
    }
}

function prepareQuestion(question){
    const owi=question.options.map((opt,i)=>({text:opt,originalIndex:i}));
    if(question.type==='vf') return owi;
    for(let i=owi.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[owi[i],owi[j]]=[owi[j],owi[i]];}
    return owi;
}

function askQuestion(passedQuestion){
    if(passedQuestion){const shuffled=prepareQuestion(passedQuestion);setState({gameState:'answering',isProcessing:false,hiddenOptionIndices:[],currentQuestion:passedQuestion,shuffledOptions:shuffled,pendingPassQuestion:null});startTimer();pushGameStateToFirebase();return;}
    if(state.pendingPassQuestion){const q=state.pendingPassQuestion;const shuffled=prepareQuestion(q);setState({gameState:'answering',isProcessing:false,hiddenOptionIndices:[],currentQuestion:q,shuffledOptions:shuffled,pendingPassQuestion:null});startTimer();pushGameStateToFirebase();return;}
    let pool=state.questions.filter(q=>!state.usedQuestionIds.includes(q.id));
    if(state.activeGameCategory!=='Todas') pool=pool.filter(q=>q.category===state.activeGameCategory);
    if(pool.length===0){state.usedQuestionIds=[];pool=state.questions;if(state.activeGameCategory!=='Todas')pool=pool.filter(q=>q.category===state.activeGameCategory);showNotification("Perguntas recicladas!","info");}
    if(pool.length===0){showNotification("Sem perguntas!",'warning');nextTurn();return;}
    const sel=pool[Math.floor(Math.random()*pool.length)];
    setState({usedQuestionIds:[...state.usedQuestionIds,sel.id]},false);
    const shuffled=prepareQuestion(sel);
    setState({gameState:'answering',isProcessing:false,hiddenOptionIndices:[],currentQuestion:sel,shuffledOptions:shuffled,pendingPassQuestion:null});
    startTimer();
    pushGameStateToFirebase(); // celulares recebem a pergunta
}

function useCard(cardId){
    const pIdx=state.turnIndex; const np=[...state.players]; const player=np[pIdx];
    const ci=player.cards.indexOf(cardId); if(ci>-1) player.cards.splice(ci,1);
    switch(cardId){
        case 'FIFTY_FIFTY':{const co=state.currentQuestion.answer;const wr=state.shuffledOptions.map((o,idx)=>o.originalIndex!==co?idx:-1).filter(i=>i!==-1);const th=wr.sort(()=>0.5-Math.random()).slice(0,2);setState({hiddenOptionIndices:[...state.hiddenOptionIndices,...th],players:np});showNotification("50/50 Ativado!","success");return;}
        case 'ONE_OUT':{const co2=state.currentQuestion.answer;const wr2=state.shuffledOptions.map((o,idx)=>o.originalIndex!==co2?idx:-1).filter(i=>i!==-1);const oh=wr2[Math.floor(Math.random()*wr2.length)];setState({hiddenOptionIndices:[...state.hiddenOptionIndices,oh],players:np});return;}
        case 'SKIP_Q': stopTimer();showNotification("Pergunta Pulada!","info");setState({players:np});setTimeout(nextTurn,1000);return;
        case 'PASS_Q':{const qToPass=state.currentQuestion;stopTimer();setState({players:np,pendingPassQuestion:qToPass});const nextIdx=((state.turnIndex+state.turnDirection+state.numPlayers)%state.numPlayers);setState({turnIndex:nextIdx});showNotification("Presente para o prГіximo!","info");setTimeout(()=>askQuestion(qToPass),1000);return;}
        case 'IMMUNITY': player.immunityTurns=3;showNotification("Imunidade (3 turnos)!","success");break;
        case 'REVERSE': player.reverseEffectTurns=4;showNotification("Espelho (4 turnos)!","success");break;
        case 'ADD_TIME': setState({timer:state.timer+30,players:np},true);showNotification("+30 Segundos!","success");return;
        case 'FREEZE_TIME': setState({isTimerFrozen:true,players:np});showNotification("Tempo Congelado!","info");return;
        case 'LUCKY_DICE': player.hasLuckyDice=true;showNotification("Dado da Sorte ativado!","success");break;
        case 'UNLUCKY_DICE': setState({players:np},false);openTargetSelection(tIdx=>{const npp=[...state.players];npp[tIdx].hasUnluckyDice=true;setState({players:npp,modalContent:null});showNotification("Dado do Azar enviado!","success");});return;
        case 'REDUCE_TIME': setState({players:np},false);openTargetSelection(tIdx=>{showNotification(`Tempo de ${state.players[tIdx].name} reduzido!`,"success");const npp=[...state.players];npp[tIdx].reducedTime=true;setState({players:npp,modalContent:null});});return;
        default: break;
    }
    setState({players:np});
}

function finishRoulette(count){
    count=count||1; let pc=Object.keys(POWER_CARDS);
    if(state.boardDifficulty==='SIMPLE') pc=pc.filter(k=>!POWER_CARDS[k].isAdvanced);
    const np=[...state.players]; let wonCards=[];
    for(let i=0;i<count;i++){const won=pc[Math.floor(Math.random()*pc.length)];np[state.turnIndex].cards.push(won);wonCards.push(won);}
    const wonName=wonCards.map(c=>POWER_CARDS[c].name).join(' + ');
    setState({players:np,modalContent:null,rouletteCard:wonCards[0]});
    showNotification(`Ganhou: ${wonName}!`,'success',3000); setTimeout(nextTurn,1500);
}

function handleAnswer(shuffledIdx){
    if(state.isProcessing) return;
    const pIdx=state.turnIndex; const p=state.players[pIdx];
    const correct=shuffledIdx!==-1&&state.shuffledOptions[shuffledIdx].originalIndex===state.currentQuestion.answer;
    if(correct){
        setState({isProcessing:true}); stopTimer();
        const np=[...state.players]; np[pIdx].score+=100; setState({players:np});
        showNotification(`Correto!`,'success');
        if(p.questionsToAnswer>1){const np2=[...state.players];np2[pIdx].questionsToAnswer--;setState({players:np2});setTimeout(askQuestion,1500);}
        else{const np3=[...state.players];np3[pIdx].questionsToAnswer=1;setState({players:np3});setTimeout(nextTurn,1000);}
    } else {
        if(p.cards.includes('RETRY_CARD')){const np=[...state.players];np[pIdx].cards.splice(np[pIdx].cards.indexOf('RETRY_CARD'),1);setState({players:np});showNotification("2ВӘ Chance! Tente novamente!",'info');setState({timer:Math.max(state.timer,15)},true);return;}
        setState({isProcessing:true}); stopTimer();
        showNotification(shuffledIdx===-1?"Tempo Esgotado! Volte 1 casa.":"Errou! Volte 1 casa.",'error');
        if(p.questionsToAnswer>1){const np=[...state.players];np[pIdx].questionsToAnswer=1;setState({players:np});}
        animateMove(pIdx,p.position,Math.max(0,p.position-1),()=>setTimeout(nextTurn,500));
    }
    pushGameStateToFirebase();
}

function nextTurn(){
    stopTimer();
    if(state.players[state.turnIndex].position>=99){setState({gameState:'game_over'});pushGameStateToFirebase();return;}
    if(state.activeField){
        const nf={...state.activeField,turns:state.activeField.turns-1};
        if(nf.turns<=0){setState({activeField:null});showNotification("O Campo se dissipou...","info");}
        else setState({activeField:nf});
    }
    let nextIdx=(state.turnIndex+state.turnDirection);
    nextIdx=((nextIdx%state.numPlayers)+state.numPlayers)%state.numPlayers;
    const nextPlayer=state.players[nextIdx];
    let reducedStart=60;
    if(nextPlayer&&nextPlayer.reducedTime){reducedStart=30;const np=[...state.players];np[nextIdx].reducedTime=false;setState({players:np},false);}
    setState({gameState:'waiting_roll',currentQuestion:null,shuffledOptions:[],rouletteCard:null,modalContent:null,targetSelectionCallback:null,thiefTargetIdx:null,turnIndex:nextIdx,isProcessing:false,diceDisplay:'1',pendingPassQuestion:null,fieldAnimActive:false,reducedTimeForNext:reducedStart<60?reducedStart:null});
    pushGameStateToFirebase();
    runCpuLogic();
}

function runCpuLogic(){
    if(state.screen!=='game') return;
    const p=state.players[state.turnIndex]; if(!p||!p.isCpu) return;
    const useChance=state.cpuDifficulty==='HARD'?0.85:state.cpuDifficulty==='EASY'?0.25:0.5;
    if(state.gameState==='waiting_roll'&&!state.isRolling&&state.modalContent!=='target_selection'&&!state.fieldAnimActive){
        const boardCards=['LUCKY_DICE','UNLUCKY_DICE','REDUCE_TIME','IMMUNITY','REVERSE'];
        const hasBoard=p.cards.filter(c=>boardCards.includes(c));
        if(hasBoard.length>0&&Math.random()<useChance){
            let pick;
            if(state.cpuDifficulty==='HARD'){const opponents=state.players.filter((_,i)=>i!==state.turnIndex);const anyAhead=opponents.some(op=>op.position>p.position);const offensive=hasBoard.filter(c=>['UNLUCKY_DICE','REDUCE_TIME'].includes(c));const defensive=hasBoard.filter(c=>['IMMUNITY','REVERSE'].includes(c));const boost=hasBoard.filter(c=>c==='LUCKY_DICE');if(anyAhead&&offensive.length>0)pick=offensive[Math.floor(Math.random()*offensive.length)];else if(boost.length>0)pick=boost[0];else if(defensive.length>0)pick=defensive[Math.floor(Math.random()*defensive.length)];else pick=hasBoard[Math.floor(Math.random()*hasBoard.length)];}
            else{pick=hasBoard[Math.floor(Math.random()*hasBoard.length)];}
            setTimeout(()=>{if(state.gameState==='waiting_roll'&&state.players[state.turnIndex]&&state.players[state.turnIndex].isCpu){useCard(pick);setTimeout(()=>{if(state.gameState==='waiting_roll'&&state.players[state.turnIndex]&&state.players[state.turnIndex].isCpu)rollDice();},800);}},900);
            return;
        }
        setTimeout(()=>{if(state.gameState==='waiting_roll'&&state.players[state.turnIndex]&&state.players[state.turnIndex].isCpu)rollDice();},1500);
    }
    if(state.gameState==='answering'&&state.currentQuestion&&!state.isProcessing){
        setTimeout(()=>{
            if(state.gameState!=='answering') return;
            const qCards=['ADD_TIME','FREEZE_TIME','FIFTY_FIFTY','ONE_OUT','SKIP_Q'];
            const hasQ=p.cards.filter(c=>qCards.includes(c));
            if(hasQ.length>0&&Math.random()<useChance){
                let pick;
                if(state.cpuDifficulty==='HARD'){const helpers=hasQ.filter(c=>['FIFTY_FIFTY','ONE_OUT'].includes(c));const timeCards=hasQ.filter(c=>['ADD_TIME','FREEZE_TIME'].includes(c));const skip=hasQ.filter(c=>c==='SKIP_Q');if(helpers.length>0)pick=helpers[0];else if(state.timer<20&&timeCards.length>0)pick=timeCards[0];else if(skip.length>0)pick=skip[0];else pick=hasQ[Math.floor(Math.random()*hasQ.length)];}
                else{pick=hasQ[Math.floor(Math.random()*hasQ.length)];}
                useCard(pick);
                setTimeout(()=>{if(state.gameState!=='answering')return;let hc=0.5;if(state.cpuDifficulty==='EASY')hc=0.3;if(state.cpuDifficulty==='HARD')hc=0.9;const hit=Math.random()<hc;const ci=state.shuffledOptions.findIndex(o=>o.originalIndex===state.currentQuestion.answer);let ai=hit?ci:state.shuffledOptions.findIndex((_,i)=>i!==ci&&!state.hiddenOptionIndices.includes(i));if(ai===-1)ai=ci;handleAnswer(ai);},1000);
                return;
            }
            let hc=0.5;if(state.cpuDifficulty==='EASY')hc=0.3;if(state.cpuDifficulty==='HARD')hc=0.9;
            const hit=Math.random()<hc;const ci=state.shuffledOptions.findIndex(o=>o.originalIndex===state.currentQuestion.answer);let ai=hit?ci:state.shuffledOptions.findIndex((_,i)=>i!==ci&&!state.hiddenOptionIndices.includes(i));if(ai===-1)ai=ci;handleAnswer(ai);
        },2500);
    }
}

function startGameCommon(players){

        const rand=Math.random();
        if(rand<0.08) return{id:i,type:SPECIAL_TYPES.ROULETTE};
        if(rand<0.28){const excl=['NONE','QUESTION','EMPTY','ROULETTE','WORMHOLE','RESET_START'];let types=Object.values(SPECIAL_TYPES).filter(t=>!excl.includes(t.id));if(!isAdv)types=types.filter(t=>!t.isAdvanced);if(!state.enableFields)types=types.filter(t=>t.id!=='FIELD_SPOT');return{id:i,type:types[Math.floor(Math.random()*types.length)]};}
        if(rand<0.45) return{id:i,type:SPECIAL_TYPES.EMPTY};
        return{id:i,type:SPECIAL_TYPES.QUESTION};
    });
    let wh={};
    if(isAdv){let w1=Math.floor(Math.random()*40)+10;let w2=Math.floor(Math.random()*40)+50;board[w1].type=SPECIAL_TYPES.WORMHOLE;board[w2].type=SPECIAL_TYPES.WORMHOLE;wh={[w1]:w2,[w2]:w1};if(Math.random()>0.5)board[Math.floor(Math.random()*9)+89].type=SPECIAL_TYPES.RESET_START;}
    setState({players,turnIndex:0,gameState:'waiting_roll',gameBoard:board,wormholePairs:wh,turnDirection:1,screen:'game',diceValue:1,isRolling:false,currentQuestion:null,notification:null,isMenuOpen:false,rouletteCard:null,usedQuestionIds:[],inventoryPlayerIdx:0,targetSelectionCallback:null,activeField:null,pendingPassQuestion:null,fieldAnimActive:false});
    // Publica configuraГ§ГЈo da sala para os celulares
    if(roomRef){
        roomRef.update({ status: 'game', numPlayers: state.numPlayers });
        roomRef.child('questions').set(state.questions);
    }
    pushGameStateToFirebase();
    runCpuLogic();
}

function loadTXT(e){
    const fr=new FileReader();fr.onload=ev=>{
        const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(l=>l);

        lines.forEach(l=>{
            if(l.startsWith('P:')){if(curr)nqs.push(curr);curr={id:Date.now()+Math.random(),type:'obj',category:'Import',question:l.substring(2).trim(),options:[],answer:0};}
            else if(curr){
                if(l.startsWith('T:')){if(l.substring(2).trim().toUpperCase()==='VF'){curr.type='vf';curr.options=["Verdadeiro","Falso","",""];}}
                else if(l.match(/^[A-D]\)/)){curr.options.push(l.substring(2).trim());}
                else if(l.startsWith('R:')){const r=l.substring(2).trim().toUpperCase();if(curr.type==='vf'){curr.answer=(r==='V'||r==='VERDADEIRO')?0:1;}else{curr.answer=r.charCodeAt(0)-65;}}
            }
        });
        if(curr)nqs.push(curr);
        if(nqs.length){setState({questions:[...state.questions,...nqs]});showNotification(`${nqs.length} perguntas importadas!`,'success');}
    };fr.readAsText(e.target.files[0]);
}

        if(i<99&&!isFog){const nc=layoutMap[i+1];const cc=layoutMap[i];let ai='';let ac='';if(nc.col>cc.col){ai='в–¶';ac='arrow-right';}else if(nc.col<cc.col){ai='в—Җ';ac='arrow-left';}else if(nc.row<cc.row){ai='в–І';ac='arrow-up';}else if(nc.row>cc.row){ai='в–ј';ac='arrow-down';}if(ai)arrowHTML=`<div class="arrow-dir ${ac}">${ai}</div>`;}
        const cs=!isH?`grid-column:${layoutMap[i].col};grid-row:${layoutMap[i].row};`:'';
        const bs=(data.type.id!=='QUESTION'&&data.type.id!=='EMPTY')?`background-color:${bg};`:'';
        const tipLabel=(i===0)?'InГӯcio':(i===99)?'Chegada':(data.type.id==='EMPTY'?'':(data.type.label||''));
        const tooltipHTML=tipLabel?`<div class="tile-tooltip">${data.type.icon||''}${tipLabel}</div>`:'';
        tilesHTML+=`<div id="tile-${i}" style="${cs}${bs}" class="tile ${isH?'tile-horizontal':''} ${extraClass} ${isFog?'fog-effect':''}">
            <span class="tile-number">${isFog?'':i+1}</span>
            <span class="tile-icon">${isFog?'':icon}</span>
            ${arrowHTML}
            <div class="players-on-tile">${ph.map(p=>`<div class="player-token">${p.avatar}</div>`).join('')}</div>
            ${tooltipHTML}
        </div>`;
    });
    return `<div class="board-container" style="background-color:${theme.bgBoard};${isH?'overflow-x:auto;display:block;height:140px':''}">
        ${state.activeField?`<div class="field-banner" style="background:${FIELDS[fieldType].color}">${FIELDS[fieldType].icon} ${FIELDS[fieldType].name} вҖ” ${state.activeField.turns} turnos</div>`:''}
        <div class="${isH?'board-horizontal':'board-grid'}">${tilesHTML}</div>
        <div class="fab-container">
            <button id="fab-zoom-in" class="fab-btn" title="Ampliar" style="font-size:1.1rem">пјӢ</button>
            <button id="fab-zoom-out" class="fab-btn" title="Reduzir" style="font-size:1.1rem">пјҚ</button>
            <button id="fab-present" class="fab-btn" title="Tela Cheia" style="background:${state.presentationMode?'rgba(220,38,38,0.25)':'rgba(6,214,160,0.12)'}">${state.presentationMode?'вң•':'рҹ–ҘпёҸ'}</button>

        </div>
        ${state.boardZoom!==1?`<div class="zoom-badge">${Math.round(state.boardZoom*100)}%</div>`:''}
    </div>`;
};

const renderPlayerCards=()=>{
    return state.players.map((p,i)=>{
        const isActive=i===state.turnIndex;
        const connected=state.connectedPlayers[i];
        const onlineDot=connected?'<span class="online-dot"></span>':'<span class="offline-dot"></span>';
        let badges='';
        if(p.skipTurns>0) badges+=`<span class="status-badge" style="background:#7c3aed">вҸё ${p.skipTurns}</span>`;
        if(p.immunityTurns>0) badges+=`<span class="status-badge" style="background:#059669">рҹӣЎ ${p.immunityTurns}</span>`;
        if(p.skullTurns>0) badges+=`<span class="status-badge" style="background:#1f2937">рҹ’Җ ${p.skullTurns}</span>`;
        if(p.isStuck) badges+=`<span class="status-badge" style="background:#78350f">вҸұпёҸ</span>`;
        if(p.cards&&p.cards.length>0) badges+=`<span class="status-badge" style="background:rgba(108,99,255,0.5)">рҹҺ’ ${p.cards.length}</span>`;
        return `<div class="player-card${isActive?' active':''}" data-player-idx="${i}">
            <div class="player-avatar" style="border-color:${isActive?'var(--accent)':'transparent'}">${p.avatar}</div>
            <div class="player-info">
                <div class="player-name">${p.name}${onlineDot}<span style="color:var(--gold)">вҳ…${p.score}</span></div>
                <div class="player-status">${badges}</div>
                <div style="font-size:0.63rem;color:var(--text-muted);margin-top:2px">Casa ${p.position+1}</div>
            </div>
        </div>`;
    }).join('');
};

const renderQuestion=()=>{
    const q=state.currentQuestion;
    const p=state.players[state.turnIndex];
    if(!q) return '';
    const opts=state.shuffledOptions.map((o,idx)=>{
        if(state.hiddenOptionIndices.includes(idx)) return '';
        const letters=['A','B','C','D'];
        return `<button class="question-option" data-answer-index="${idx}" ${state.isProcessing?'disabled':''}>
            <span class="opt-letter">${letters[idx]}</span>
            <span>${o.text}</span>
        </button>`;
    }).join('');
    const cardButtons = p.cards.map(c=>{
        const card=POWER_CARDS[c]; if(!card) return '';
        const useIn=card.useIn;
        const canUse=(useIn==='question')||(useIn==='passive');
        if(!canUse) return '';
        return `<button class="btn-use-card" data-card="${c}" style="background:rgba(108,99,255,0.18);color:var(--accent-hi);padding:6px 11px;border-radius:7px;font-size:0.72rem;font-weight:700;border:1px solid rgba(108,99,255,0.3)">${card.icon} ${card.name}</button>`;
    }).join('');
    return `<div class="modal-overlay">
        <div class="modal-content" style="max-width:560px">
            <div class="timer-bar-container"><div class="timer-bar" id="q-timer-bar" style="width:100%"></div></div>
            <div class="modal-header" style="background:linear-gradient(135deg,${state.currentTheme.accent},${state.currentTheme.accent}bb)">
                <span>${q.category||'Geral'}</span>
                <span id="q-timer-disp" style="font-family:var(--font-display);font-size:1.5rem;color:var(--gold)">${state.timer}s</span>
            </div>
            <div class="modal-body">
                <p style="font-size:0.95rem;font-weight:600;margin-bottom:16px;line-height:1.5">${q.question}</p>
                ${cardButtons?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${cardButtons}</div>`:''}
                ${opts}
                ${!p.isCpu?`<p style="font-size:0.72rem;color:var(--text-muted);text-align:center;margin-top:10px">рҹ“ұ Jogador responde pelo celular ou clique aqui</p>`:''}
            </div>
        </div>
    </div>`;
};
